<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>👶🏻👶🏻 Aurora & Azzalea Gallery - 6 Juli 2026</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
    }

    body {
      background: linear-gradient(145deg, #f5f0ff 0%, #e8e0f5 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 1.5rem;
    }

    .app {
      max-width: 1200px;
      width: 100%;
      background: rgba(255, 247, 252, 0.6);
      backdrop-filter: blur(4px);
      border-radius: 48px 48px 32px 32px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.08), 0 8px 16px rgba(0,0,0,0.04);
      padding: 2rem 2rem 2.5rem;
      transition: all 0.2s;
    }

    /* header */
    .header {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 1rem 1.5rem;
      margin-bottom: 2.2rem;
    }

    .title-group {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      flex-wrap: wrap;
    }

    .title-group h1 {
      font-size: 2.2rem;
      font-weight: 600;
      background: linear-gradient(135deg, #7c5f9e, #b38bce);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      letter-spacing: -0.5px;
    }

    .title-group .badge {
      background: #d9c8e6;
      color: #4a2e5e;
      font-size: 0.9rem;
      font-weight: 600;
      padding: 0.3rem 1rem;
      border-radius: 40px;
      box-shadow: inset 0 1px 4px rgba(255,255,255,0.6);
      backdrop-filter: blur(2px);
      background: rgba(217, 200, 230, 0.6);
      border: 1px solid rgba(210, 180, 230, 0.5);
    }

    .date-badge {
      background: #eee6f5;
      padding: 0.5rem 1.4rem;
      border-radius: 60px;
      font-weight: 500;
      color: #3d2b4f;
      font-size: 1rem;
      box-shadow: 0 2px 8px rgba(120, 80, 150, 0.08);
      border: 1px solid #e2d4ed;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .date-badge span {
      font-weight: 600;
      color: #6a4b82;
    }

    /* upload area */
    .upload-area {
      background: rgba(235, 220, 245, 0.5);
      border: 2px dashed #c9b3dc;
      border-radius: 60px;
      padding: 0.8rem 1.8rem 0.8rem 2rem;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      backdrop-filter: blur(2px);
      transition: 0.2s;
      margin-bottom: 2.5rem;
    }

    .upload-area:hover {
      border-color: #a885c4;
      background: rgba(235, 220, 245, 0.7);
    }

    .upload-label {
      display: flex;
      align-items: center;
      gap: 12px;
      font-weight: 500;
      color: #4a2e5e;
      cursor: pointer;
      flex: 1;
    }

    .upload-label input {
      display: none;
    }

    .upload-icon {
      font-size: 2rem;
      line-height: 1;
    }

    .upload-btn {
      background: #a885c4;
      border: none;
      padding: 0.6rem 1.8rem;
      border-radius: 40px;
      color: white;
      font-weight: 600;
      font-size: 0.95rem;
      box-shadow: 0 4px 10px rgba(140, 100, 170, 0.2);
      transition: 0.15s;
      cursor: pointer;
      border: 1px solid #c9b3dc;
      letter-spacing: 0.3px;
    }

    .upload-btn:hover {
      background: #8f6dab;
      transform: scale(0.97);
      box-shadow: 0 2px 6px rgba(120, 80, 150, 0.3);
    }

    .counter {
      font-size: 0.95rem;
      color: #5d4375;
      background: rgba(245, 235, 250, 0.7);
      padding: 0.2rem 1.2rem;
      border-radius: 30px;
      border: 1px solid #dccbe8;
      white-space: nowrap;
    }

    /* grid foto */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 1.5rem;
      margin-top: 0.5rem;
    }

    .card {
      background: white;
      border-radius: 32px;
      overflow: hidden;
      box-shadow: 0 8px 20px rgba(120, 80, 150, 0.08);
      transition: 0.2s ease;
      border: 1px solid rgba(210, 180, 230, 0.3);
      backdrop-filter: blur(2px);
      background: rgba(255, 250, 252, 0.7);
      display: flex;
      flex-direction: column;
    }

    .card:hover {
      transform: translateY(-6px) scale(1.01);
      box-shadow: 0 18px 32px rgba(120, 80, 150, 0.12);
      border-color: #c9b3dc;
    }

    .card img {
      width: 100%;
      aspect-ratio: 1 / 1;
      object-fit: cover;
      display: block;
      background: #ede4f2;
      transition: 0.2s;
    }

    .card img:hover {
      filter: brightness(1.02);
    }

    .card-footer {
      padding: 0.9rem 1rem 1rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .timestamp {
      font-size: 0.7rem;
      color: #8a6f9e;
      background: #f0e6f5;
      padding: 0.2rem 0.8rem;
      border-radius: 40px;
      letter-spacing: 0.3px;
    }

    .delete-btn {
      background: none;
      border: none;
      color: #b48fc9;
      font-size: 1.2rem;
      cursor: pointer;
      padding: 0 6px;
      transition: 0.15s;
      opacity: 0.5;
      border-radius: 30px;
      line-height: 1;
    }

    .delete-btn:hover {
      color: #8f5ba8;
      opacity: 1;
      background: #f1e4f7;
      transform: scale(1.1);
    }

    .empty-message {
      grid-column: 1 / -1;
      text-align: center;
      padding: 4rem 0;
      color: #7a5f8d;
      font-size: 1.15rem;
      background: rgba(245, 235, 250, 0.2);
      border-radius: 60px;
      backdrop-filter: blur(2px);
      border: 1px solid #dccbe8;
    }

    .empty-message span {
      font-size: 3rem;
      display: block;
      margin-bottom: 0.8rem;
    }

    /* respon */
    @media (max-width: 640px) {
      .app {
        padding: 1rem 1rem 1.8rem;
        border-radius: 32px;
      }
      .title-group h1 {
        font-size: 1.7rem;
      }
      .upload-area {
        flex-direction: column;
        align-items: stretch;
        padding: 1rem 1.2rem;
        border-radius: 40px;
      }
      .upload-label {
        justify-content: center;
      }
      .upload-btn {
        width: 100%;
        text-align: center;
        padding: 0.7rem;
      }
      .counter {
        text-align: center;
      }
      .date-badge {
        font-size: 0.85rem;
        padding: 0.3rem 1rem;
      }
      .grid {
        grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
        gap: 1rem;
      }
    }

    @media (max-width: 420px) {
      .grid {
        grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
        gap: 0.8rem;
      }
    }
  </style>
</head>
<body>
<div class="app" id="app">
  <div class="header">
    <div class="title-group">
      <h1>👶🏻👶🏻 Aurora &amp; Azzalea Gallery</h1>
      <span class="badge">✨ 6 Juli 2026</span>
    </div>
    <div class="date-badge">
      🗓️ Lahir: <span id="birthDateDisplay">6 Juli 2026</span>
    </div>
  </div>

  <!-- Upload -->
  <div class="upload-area">
    <label class="upload-label" for="imageInput">
      <span class="upload-icon">📸</span>
      <span style="flex:1;">Pilih foto dari galeri / kamera</span>
      <input type="file" id="imageInput" accept="image/*" multiple />
    </label>
    <button class="upload-btn" id="uploadBtn" type="button">📤 Unggah</button>
    <span class="counter" id="photoCounter">0 foto</span>
  </div>

  <!-- Grid foto -->
  <div class="grid" id="photoGrid">
    <div class="empty-message">
      <span>🖼️</span>
      Belum ada foto. Yuk, unggah momen pertama Aurora & Azzalea!
    </div>
  </div>
</div>

<script>
  (function() {
    const STORAGE_KEY = 'aurora_azzalea_photos_6july2026';

    let photos = [];

    const grid = document.getElementById('photoGrid');
    const counter = document.getElementById('photoCounter');
    const fileInput = document.getElementById('imageInput');
    const uploadBtn = document.getElementById('uploadBtn');

    function loadFromStorage() {
      try {
        const stored = localStorage.getItem(STORAGE_KEY);
        if (stored) {
          const parsed = JSON.parse(stored);
          if (Array.isArray(parsed)) {
            photos = parsed;
            return;
          }
        }
      } catch (_) {}
      photos = [];
    }

    function saveToStorage() {
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(photos));
      } catch (_) {}
    }

    function render() {
      const count = photos.length;
      counter.textContent = count + ' foto';

      if (count === 0) {
        grid.innerHTML = `
          <div class="empty-message">
            <span>🖼️</span>
            Belum ada foto. Yuk, unggah momen pertama Aurora & Azzalea!
          </div>
        `;
        return;
      }

      let html = '';
      const sorted = [...photos].reverse();
      for (const photo of sorted) {
        const date = new Date(photo.timestamp);
        const dateStr = date.toLocaleDateString('id-ID', { day: 'numeric', month: 'short', year: 'numeric' });
        const timeStr = date.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' });
        html += `
          <div class="card" data-id="${photo.id}">
            <img src="${photo.dataUrl}" alt="Foto Aurora & Azzalea" loading="lazy" />
            <div class="card-footer">
              <span class="timestamp">📅 ${dateStr} · ${timeStr}</span>
              <button class="delete-btn" data-id="${photo.id}" title="Hapus foto">✕</button>
            </div>
          </div>
        `;
      }
      grid.innerHTML = html;

      grid.querySelectorAll('.delete-btn').forEach(btn => {
        btn.addEventListener('click', function(e) {
          e.stopPropagation();
          const id = this.getAttribute('data-id');
          if (id && confirm('Hapus foto ini?')) {
            deletePhotoById(id);
          }
        });
      });
    }

    function deletePhotoById(id) {
      const index = photos.findIndex(p => p.id === id);
      if (index === -1) return;
      photos.splice(index, 1);
      saveToStorage();
      render();
    }

    function addPhotos(fileList) {
      if (!fileList || fileList.length === 0) return;

      const files = Array.from(fileList).filter(file => file.type.startsWith('image/'));
      if (files.length === 0) {
        alert('Pilih file gambar yang valid (jpg, png, dll).');
        return;
      }

      let loaded = 0;
      for (const file of files) {
        const reader = new FileReader();
        reader.onload = function(e) {
          const dataUrl = e.target.result;
          const id = Date.now() + '-' + Math.random().toString(36).substr(2, 6) + '-' + loaded;
          photos.push({
            id: id,
            dataUrl: dataUrl,
            timestamp: Date.now()
          });
          loaded++;
          if (loaded === files.length) {
            saveToStorage();
            render();
            fileInput.value = '';
          }
        };
        reader.onerror = function() {
          loaded++;
          if (loaded === files.length) {
            saveToStorage();
            render();
            fileInput.value = '';
          }
        };
        reader.readAsDataURL(file);
      }
    }

    uploadBtn.addEventListener('click', function() {
      if (fileInput.files && fileInput.files.length > 0) {
        addPhotos(fileInput.files);
      } else {
        alert('Silakan pilih foto terlebih dahulu.');
      }
    });

    fileInput.addEventListener('change', function() {
      if (this.files && this.files.length > 0) {
        addPhotos(this.files);
        this.value = '';
      }
    });

    loadFromStorage();
    render();

    const birthSpan = document.getElementById('birthDateDisplay');
    if (birthSpan) {
      const birth = new Date(2026, 6, 6); // 6 Juli 2026 (month 0-index, Juli=6)
      birthSpan.textContent = birth.toLocaleDateString('id-ID', { day: 'numeric', month: 'long', year: 'numeric' });
    }
  })();
</script>
</body>
</html>
