<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aurora & Azzalea Gallery</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="style.css" />
  <meta name="theme-color" content="#7c5f9e" />
  <meta name="description" content="Galeri foto untuk Aurora & Azzalea, lahir 6 Juli 2026" />
</head>
<body>
  <div class="app">
    <div class="header">
      <div class="title-group">
        <h1>👶🏻👶🏻 Aurora &amp; Azzalea Gallery</h1>
        <span class="badge">✨ 6 Juli 2026</span>
      </div>
      <div class="date-badge">
        🗓️ Lahir: <span id="birthDateDisplay">6 Juli 2026</span>
      </div>
    </div>

    <div class="upload-area">
      <label class="upload-label" for="imageInput">
        <span class="upload-icon">📸</span>
        <span>Pilih foto dari galeri / kamera</span>
        <input type="file" id="imageInput" accept="image/*" multiple />
      </label>
      <button class="upload-btn" id="uploadBtn" type="button">📤 Unggah</button>
      <span class="counter" id="photoCounter">0 foto</span>
    </div>

    <div class="grid" id="photoGrid">
      <div class="empty-message">
        <span>🖼️</span>Belum ada foto. Yuk, unggah momen pertama Aurora & Azzalea!
      </div>
    </div>
  </div>

  <div id="toast" class="toast"></div>

  <script src="app.js"></script>
</body>
</html>
